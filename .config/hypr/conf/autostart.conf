# Setup XDG for screen sharing and start waypaper and waybar
exec-once = ~/.config/hypr/scripts/xdg.sh
exec-once = waybar -c ~/.config/waybar/themes/opium/config -s ~/.config/waybar/themes/opium/style.css

# Start Polkit
exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Load Notification Daemon
exec-once = swaync

# Load GTK settings
exec-once = ~/.config/hypr/scripts/gtk.sh

# Using hypridle to start hyprlock
exec-once = hypridle

# Load cliphist history
exec-once = wl-paste --watch cliphist store

# Autostart ML4W App
exec-once = ~/.config/ml4w/scripts/ml4w-autostart.sh

# Start autostart cleanup
exec-once = ~/.config/hypr/scripts/cleanup.sh

# Load configuration from ML4W Hyprland Settings App
exec = ~/.config/com.ml4w.hyprlandsettings/hyprctl.sh

# Dock
exec-once = ~/.config/nwg-dock-hyprland/launch.sh

# Hyprland plugins
exec-once = hyprpm reload

# Doom fire wallpaper
exec-once = doomfire-wallpaper

# Flameshot screenshot
exec-once = flameshot

# Start openrazor daemon for polychoromatic
exec-once = openrazer-daemon -Fv

# Start hyprsunset + nerdshade
exec-once = hyprsunset 
exec-once = nerdshade -latitude 51.448 -longitude -2.53936 -loop

# Start Steam in background
exec-once = steam -silent

# Start Xbox guide button watcher (launches Steam if not running)
exec-once = python3 ~/.config/ml4w/scripts/gamepad-monitor.py

# Start ghostty
exec-once = ghostty

# Launch the QMK HUD on startup
exec-once = env LD_PRELOAD=/usr/lib/libgtk4-layer-shell.so python ~/Documents/overkeys-vibeclone/layer_overlay.py
